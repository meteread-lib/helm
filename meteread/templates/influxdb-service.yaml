apiVersion: v1
kind: Service
metadata:
  name: {{ include "meteread.fullname" . }}-influxdb
  labels:
    {{- include "meteread.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.influxdb.service.port }}
      targetPort: {{ .Values.influxdb.service.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "influxdb.selectorLabels" . | nindent 4 }}
